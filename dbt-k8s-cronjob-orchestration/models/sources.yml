version: 2

sources:
  - name: app_db
    database: data_lake
    schema: app_public
    description: Primary application database replica
    tables:
      - name: companies
      - name: users
      - name: cards
      - name: transactions
      - name: budgets
      - name: reimbursements
      - name: subscriptions
      - name: billing_info

  - name: crm
    database: data_lake
    schema: crm_public
    description: CRM platform data
    tables:
      - name: accounts
      - name: contacts
      - name: opportunities
      - name: campaigns

  - name: payments
    database: data_lake
    schema: payments_public
    description: Payment processing data
    tables:
      - name: payment_events
      - name: settlements
      - name: funding_sources
